- name: Bootstrap fresh VPS (run once)
  hosts: vps
  become: true
  gather_facts: false
  vars_files:
    - group_vars/vps.yml
    - group_vars/vps.vault.yml
  vars:
    ansible_user: root
    ansible_port: 22
    ansible_ssh_private_key_file: "{{ vps_ssh_private_key_file_init | default(omit) }}"
    ansible_password: "{{ vps_initial_ssh_password | default(omit) }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o PasswordAuthentication=yes -o PreferredAuthentications=password,keyboard-interactive"
  tasks:
    - name: Create admin user
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        shell: /bin/bash
        create_home: true

    - name: Set authorized key for admin user
      ansible.builtin.authorized_key:
        user: "{{ admin_user }}"
        key: "{{ admin_pubkey }}"

    - name: Ensure sudo without password for admin user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ admin_user }}"
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: "0440"
      when: sudo_nopasswd | default(false)

    - name: Install required packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - openssh-server
          - ufw
          - fail2ban
        state: present
      register: apt_result
      retries: 5
      delay: 10
      until: apt_result is success

    - name: Ensure OpenSSH drop-in directory exists
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        mode: "0755"

    - name: Deploy hardened SSH config
      ansible.builtin.template:
        src: roles/security/templates/sshd-hardening.conf.j2
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        mode: "0644"

    - name: Validate SSH configuration
      ansible.builtin.command: /usr/sbin/sshd -t
      changed_when: false

    - name: Allow SSH on port 22 via UFW
      community.general.ufw:
        rule: limit
        port: "22"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Start and enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true
