- name: Configure VPS
  hosts: vps
  become: true
  gather_facts: false
  vars_files:
    - group_vars/vps.yml
    - group_vars/vps.vault.yml
  vars:
    ansible_user: "{{ admin_user }}"
    ansible_port: "{{ ssh_port }}"
    ansible_ssh_private_key_file: "{{ vps_ssh_private_key_file }}"
  tasks:
    - import_role:
        name: common
      tags: common

    - import_role:
        name: security
      tags: security

    - import_role:
        name: docker
      tags: docker

    - import_role:
        name: openclaw_build
      tags: openclaw_build

    - import_role:
        name: deploy_stack
      tags: deploy_stack

    - import_role:
        name: backup
      tags: backup

    - import_role:
        name: openclaw_integration
      tags: openclaw_integration

    # =========================================================================
    # Cybersecurity & Observability Stack
    # =========================================================================
    # WHY: These roles add security monitoring, log analysis, vulnerability
    # scanning, and enhanced observability to the existing infrastructure.
    # They are designed to be modular and independently runnable via tags.
    #
    # Deployment order matters:
    #   1. secure_networking: Docker security, UFW rules, Traefik middlewares
    #   2. loki_security: Enhanced Promtail/Loki config for security logs
    #   3. prometheus_security: node_exporter, alerting rules
    #   4. grafana_security: Security dashboards
    #   5. security_audit: Lynis installation and configuration
    #   6. wazuh: Wazuh manager + optional agent
    # =========================================================================

    - import_role:
        name: secure_networking
      tags:
        - secure_networking
        - security

    - import_role:
        name: loki_security
      tags:
        - loki_security
        - monitoring

    - import_role:
        name: prometheus_security
      tags:
        - prometheus_security
        - monitoring

    - import_role:
        name: grafana_security
      tags:
        - grafana_security
        - monitoring

    - import_role:
        name: security_audit
      tags:
        - security_audit
        - lynis

    - import_role:
        name: wazuh
      tags:
        - wazuh
        - security
