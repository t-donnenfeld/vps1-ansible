ssh_port: 22
admin_user: theo
admin_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKzg2IE4TSt6qRRzJhnrAbW945OslJPAsYfFYOv0sI75 theo"
sudo_nopasswd: true
vps_ssh_private_key_file: "~/.ssh/id_ed25519"
apt_cache_valid_time: 3600
apt_dist_upgrade: true

ssh_allow_users:
  - "{{ admin_user }}"
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
ssh_max_auth_tries: 3
ssh_max_sessions: 5
ssh_login_grace_time: 30

ufw_logging_level: low

fail2ban_bantime: 1h
fail2ban_findtime: 10m
fail2ban_maxretry: 5
fail2ban_sender: fail2ban@{{ domain }}

unattended_update_package_lists: 1
unattended_download_upgradeable_packages: 1
unattended_autoclean_interval: 7
unattended_upgrade_enabled: 1
unattended_remove_unused_deps: true
unattended_auto_reboot: false
unattended_auto_reboot_time: "03:30"
unattended_mail_recipient: "{{ email_admin }}"
unattended_mail_only_on_error: true

# Domain / routing
domain: les12.fr
subdomain_auth: auth
subdomain_tasks: tasks
subdomain_dashboard: traefik
subdomain_music: music
subdomain_syncthing: sync
subdomain_openclaw: claw
email_admin: theotime.donnenfeld@les12.fr

# Paths
stack_dir: /opt/stack

# Postgres
authelia_db_name: authelia
authelia_db_user: authelia

vikunja_db_name: vikunja
vikunja_db_user: vikunja

# Authelia OIDC
oidc_client_id: vikunja
grafana_oidc_client_id: grafana
authelia_image: authelia/authelia:latest
navidrome_image: deluan/navidrome:latest
syncthing_image: syncthing/syncthing:latest
openclaw_image: theo/openclaw:stable #Built on VPS directly
openclaw_repo_url: https://github.com/openclaw/openclaw.git
openclaw_repo_dest: /opt/openclaw-src
signal_image: bbernhard/signal-cli-rest-api:latest
music_path: /mnt/music
obsidian_vaults_dir: /opt/services/shared/obsidian/vaults
authelia_oidc_jwks_key_id: "authelia-oidc-key"
authelia_oidc_jwks_algorithm: RS256
authelia_oidc_client_secret_hash_path: "{{ stack_dir }}/authelia/secrets/oidc_client_secret.hash"
grafana_oidc_client_secret_hash_path: "{{ stack_dir }}/authelia/secrets/grafana_oidc_client_secret.hash"

authelia_oidc_private_key_path: "{{ stack_dir }}/authelia/secrets/oidc_private_key.pem"

# Mail
brevo_smtp_host: smtp-relay.brevo.com
brevo_smtp_port: 587
mail_from: "noreply@les12.fr"

# Enable Traefik dashboard? (recommended: false unless protected)
traefik_dashboard: true

# Backup
backup_dir: /var/backups/server-config
backup_retention_days: 30

# AI provider API keys (set in vault)
deepseek_api_key: ""

# OpenClaw gateway token (set in vault)
openclaw_gateway_token: ""

# Syncthing API key (auto-generated, persisted)
syncthing_api_key: ""

# Vikunja CalDAV user password (local user for CalDAV sync with DAVx5, Tasks.org, etc.)
vikunja_caldav_password: ""

# Logging / Monitoring
subdomain_grafana: grafana
grafana_image: grafana/grafana:latest
loki_image: grafana/loki:3.4.3
promtail_image: grafana/promtail:3.4.3
# grafana_admin_password: set in vault (vps.vault.yml)

