# =============================================================================
# Security Monitoring & Cybersecurity Stack
# =============================================================================

# --- Lynis Security Audit ---
# WHY: Automated security auditing with daily scans and Loki integration.
lynis_report_dir: /var/log/lynis/reports
lynis_log_dir: /var/log/lynis/logs
lynis_custom_profile_dir: /etc/lynis
lynis_script_path: /usr/local/bin/run-lynis-audit.sh
lynis_retention_days: 90
# WHY 90 days: Allows trend analysis of hardening scores over 3 months.
run_initial_audit: true
# WHY true: Run an initial audit immediately on first deploy.
# Set to false for subsequent runs (timer handles daily audits).

# --- Loki Push URL ---
# WHY: Lynis pushes audit results to this URL for Grafana visualization.
loki_push_url: http://localhost:3100

# --- Wazuh ---
# WHY: Lightweight Wazuh deployment (manager only, no indexer/dashboard).
# Alerts are forwarded to Loki via syslog for Grafana visualization.
wazuh_manager_image: wazuh/wazuh-manager:4.9.2
wazuh_agent_enabled: true
# WHY true: Wazuh agent provides FIM, rootkit detection, and vulnerability scanning.
# Set to false if running Lynis daily is sufficient for host-level auditing.
wazuh_vulnerability_detector: false
# WHY false: Vulnerability detector requires ~200MB CVE database download.
# Enable only if needed. Lynis + unattended-upgrades provide adequate coverage.
wazuh_manager_memory_limit: 1g
wazuh_manager_cpu_limit: "1.0"
wazuh_manager_memory_reservation: 512m
# WHY limits: Wazuh manager can use significant resources during startup.
# These limits prevent it from starving other containers.

# --- Prometheus Security ---
# WHY: Enhanced Prometheus config with node_exporter for host metrics.
node_exporter_image: prom/node-exporter:latest
node_exporter_memory_limit: 256M
node_exporter_cpu_limit: "0.5"

# --- Grafana Security Dashboards ---
# WHY: Pre-provisioned dashboards for security monitoring.
# Dashboard UIDs (used by Grafana for identification):
#   - vps-security-overview
#   - ssh-attack-monitor
#   - wazuh-alerts
#   - lynis-audit-trends
#   - auth-failures
#   - container-security
#   - traefik-access-anomalies

# --- Secure Networking ---
# WHY: Enhanced network security configuration.
auditd_enabled: false
# WHY false: auditd generates significant log volume (~100MB/day).
# Enable only if detailed audit trails are needed for compliance.
# Lynis + Wazuh + Prometheus provide sufficient coverage without auditd.

