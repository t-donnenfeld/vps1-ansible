---
# secure_networking — Enhanced network security, firewall, and Docker isolation
#
# WHY: The existing security role handles SSH hardening, UFW basics, and fail2ban.
# This role adds:
#   1. Enhanced UFW rules (rate limiting, Docker network awareness)
#   2. Docker daemon security configuration
#   3. Container capability dropping recommendations
#   4. Traefik rate limiting and security middlewares
#   5. Network isolation best practices
#   6. Auditd for system call auditing (optional)
#
# WHY SEPARATE ROLE: Keeps security concerns modular.
# The existing `security` role focuses on SSH and base OS hardening.
# This role focuses on network-level and Docker-level security.

- name: Create secure networking directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ stack_dir }}/traefik/dynamic"
  tags:
    - secure_networking

- name: Configure Docker daemon security options
  ansible.builtin.template:
    src: docker-daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker daemon
  tags:
    - secure_networking
    - docker

- name: Create Docker daemon directory if needed
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"
  tags:
    - secure_networking

- name: Apply enhanced UFW rules
  ansible.builtin.template:
    src: ufw-rules.sh.j2
    dest: /etc/ufw/custom-rules.sh
    mode: "0750"
  tags:
    - secure_networking
    - ufw

- name: Execute custom UFW rules
  ansible.builtin.command:
    cmd: /etc/ufw/custom-rules.sh
  register: ufw_custom_rules
  changed_when: ufw_custom_rules.rc == 0
  tags:
    - secure_networking
    - ufw

- name: Ensure UFW is enabled and logging
  ansible.builtin.ufw:
    state: enabled
    logging: "{{ ufw_logging_level | default('low') }}"
  tags:
    - secure_networking
    - ufw

- name: Render Traefik security middlewares
  ansible.builtin.template:
    src: traefik-security-middlewares.yml.j2
    dest: "{{ stack_dir }}/traefik/dynamic/security.yml"
    mode: "0644"
  notify: Restart stack
  tags:
    - secure_networking
    - traefik

- name: Install auditd (optional system call auditing)
  ansible.builtin.apt:
    name: auditd
    state: present
  when: auditd_enabled | default(false)
  tags:
    - secure_networking
    - auditd

- name: Configure auditd rules
  ansible.builtin.template:
    src: auditd-rules.j2
    dest: /etc/audit/rules.d/audit.rules
    mode: "0640"
  when: auditd_enabled | default(false)
  notify: Restart auditd
  tags:
    - secure_networking
    - auditd

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true
  when: auditd_enabled | default(false)
  tags:
    - secure_networking
    - auditd

