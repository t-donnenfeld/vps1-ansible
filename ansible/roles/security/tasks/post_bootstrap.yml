- name: Detect ssh.socket unit
  ansible.builtin.command: systemctl list-unit-files ssh.socket --no-legend
  register: ssh_socket_unit
  changed_when: false
  failed_when: false

- name: Set SSH socket activation fact
  ansible.builtin.set_fact:
    ssh_uses_socket_activation: "{{ 'ssh.socket' in ssh_socket_unit.stdout }}"

- name: Ensure SSH socket drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d
    state: directory
    mode: "0755"
  when: ssh_uses_socket_activation | bool

- name: Reconfigure SSH socket listening ports for production
  ansible.builtin.template:
    src: ssh-socket-listen.conf.j2
    dest: /etc/systemd/system/ssh.socket.d/10-listen-ports.conf
    mode: "0644"
  when: ssh_uses_socket_activation | bool

- name: Reload systemd when using SSH socket activation
  ansible.builtin.systemd:
    daemon_reload: true
  when: ssh_uses_socket_activation | bool

- name: Remove temporary bootstrap SSH firewall rule
  community.general.ufw:
    rule: allow
    port: "{{ bootstrap_ssh_port }}"
    proto: tcp
    delete: true
  when: (bootstrap_ssh_port | string) != (ssh_port | string)

- name: Restart SSH in non-bootstrap mode
  ansible.builtin.systemd:
    name: "{{ 'ssh.socket' if (ssh_uses_socket_activation | bool) else 'ssh' }}"
    state: restarted
  when: restart_ssh_service_immediately | bool
