- name: Ensure OpenSSH drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0755"

- name: Warn if connected as root and immediate SSH restart is enabled
  ansible.builtin.assert:
    that:
      - not (ansible_user | default('') == 'root' and restart_ssh_service_immediately | bool)
    fail_msg: >-
      You are connected as root and restart_ssh_service_immediately=true.
      This can lock out the play after sshd hardening is applied.
      Set restart_ssh_service_immediately=false for first run, then switch inventory to admin user.

- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0644"

- name: Validate SSH configuration
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false

- name: Detect ssh.socket unit
  ansible.builtin.command: systemctl list-unit-files ssh.socket --no-legend
  register: ssh_socket_unit
  changed_when: false
  failed_when: false

- name: Set SSH socket activation fact
  ansible.builtin.set_fact:
    ssh_uses_socket_activation: "{{ 'ssh.socket' in ssh_socket_unit.stdout }}"

- name: Ensure SSH socket drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d
    state: directory
    mode: "0755"
  when: ssh_uses_socket_activation | bool

- name: Configure SSH socket listening ports
  ansible.builtin.template:
    src: ssh-socket-listen.conf.j2
    dest: /etc/systemd/system/ssh.socket.d/10-listen-ports.conf
    mode: "0644"
  when: ssh_uses_socket_activation | bool

- name: Reload systemd when using SSH socket activation
  ansible.builtin.systemd:
    daemon_reload: true
  when: ssh_uses_socket_activation | bool

- name: Ensure SSH service is enabled and running
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true
  when: not ssh_uses_socket_activation | bool

- name: Ensure SSH socket is enabled and running
  ansible.builtin.systemd:
    name: ssh.socket
    state: started
    enabled: true
    masked: false
  when: ssh_uses_socket_activation | bool

- name: Set UFW default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set UFW default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH with rate limiting
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow bootstrap SSH port temporarily
  community.general.ufw:
    rule: allow
    port: "{{ bootstrap_ssh_port }}"
    proto: tcp
  when:
    - bootstrap | bool
    - (bootstrap_ssh_port | string) != (ssh_port | string)

- name: Enable UFW logging
  community.general.ufw:
    logging: "{{ ufw_logging_level }}"

- name: Allow HTTP/HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Deploy fail2ban jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban service is enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Deploy sysctl hardening file
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
    mode: "0644"
  notify: Reload sysctl

- name: Install unattended-upgrades packages
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Configure unattended upgrades auto mode
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
  notify: Restart unattended-upgrades

- name: Configure unattended upgrades policy
  ansible.builtin.template:
    src: 52unattended-upgrades-local.j2
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    mode: "0644"
  notify: Restart unattended-upgrades

- name: Restart SSH in non-bootstrap mode
  ansible.builtin.systemd:
    name: "{{ 'ssh.socket' if (ssh_uses_socket_activation | bool) else 'ssh' }}"
    state: restarted
  when:
    - not bootstrap | bool
    - restart_ssh_service_immediately | bool

- name: Restart SSH in bootstrap mode to open hardened port
  ansible.builtin.systemd:
    name: "{{ 'ssh.socket' if (ssh_uses_socket_activation | bool) else 'ssh' }}"
    state: restarted
  when: bootstrap | bool

