- name: Ensure OpenSSH drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0755"

- name: Deploy SSH hardening config (bootstrap port)
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0644"

- name: Validate SSH configuration
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false

- name: Detect ssh.socket unit
  ansible.builtin.command: systemctl list-unit-files ssh.socket --no-legend
  register: ssh_socket_unit
  changed_when: false
  failed_when: false

- name: Set SSH socket activation fact
  ansible.builtin.set_fact:
    ssh_uses_socket_activation: "{{ 'ssh.socket' in ssh_socket_unit.stdout }}"

- name: Ensure SSH socket drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d
    state: directory
    mode: "0755"
  when: ssh_uses_socket_activation | bool

- name: Configure SSH socket listening ports
  ansible.builtin.template:
    src: ssh-socket-listen.conf.j2
    dest: /etc/systemd/system/ssh.socket.d/10-listen-ports.conf
    mode: "0644"
  when: ssh_uses_socket_activation | bool

- name: Reload systemd when using SSH socket activation
  ansible.builtin.systemd:
    daemon_reload: true
  when: ssh_uses_socket_activation | bool

- name: Ensure SSH service is enabled and running
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true
  when: not ssh_uses_socket_activation | bool

- name: Ensure SSH socket is enabled and running
  ansible.builtin.systemd:
    name: ssh.socket
    state: started
    enabled: true
    masked: false
  when: ssh_uses_socket_activation | bool

- name: Check if UFW is active
  ansible.builtin.command:
    cmd: ufw status verbose
  register: ufw_status
  changed_when: false
  failed_when: false

- name: Allow bootstrap SSH port via UFW when active
  community.general.ufw:
    rule: allow
    port: "{{ bootstrap_ssh_port }}"
    proto: tcp
  when: "'Status: active' in ufw_status.stdout"

- name: Allow hardened SSH port via UFW when active
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
  when: "'Status: active' in ufw_status.stdout"

- name: Restart SSH to activate bootstrap port
  ansible.builtin.systemd:
    name: "{{ 'ssh.socket' if (ssh_uses_socket_activation | bool) else 'ssh' }}"
    state: restarted
