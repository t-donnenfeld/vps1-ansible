- name: Restart SSH
  ansible.builtin.service:
    name: ssh
    state: restarted
  when:
    - restart_ssh_service_immediately | bool
    - not (ssh_uses_socket_activation | default(false) | bool)

- name: Restart SSH socket
  ansible.builtin.systemd:
    name: ssh.socket
    state: restarted
  when:
    - restart_ssh_service_immediately | bool
    - ssh_uses_socket_activation | default(false) | bool

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart unattended-upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    state: restarted
    enabled: true
