---
# wazuh — Security monitoring and threat detection
#
# ARCHITECTURE DECISION: Lightweight Wazuh deployment
#
# WHY NOT FULL STACK: The full Wazuh stack (Manager + Indexer + Dashboard)
# requires ~6GB RAM minimum. The Indexer (Elasticsearch-based) alone needs
# 4GB RAM and 2 CPUs. For a personal VPS, this is disproportionate.
#
# INSTEAD: Deploy ONLY the Wazuh manager with syslog output to Loki.
# - Wazuh manager handles: FIM, rootcheck, syscheck, log analysis, alerting
# - Loki stores: All Wazuh alerts as structured logs
# - Grafana visualizes: Wazuh alerts alongside Prometheus metrics and Lynis audits
# - No Elasticsearch: Replaced by Loki (much lighter, no JVM overhead)
# - No Wazuh Dashboard: Replaced by Grafana (already deployed)
#
# TRADEOFFS:
# - Pros: ~1GB RAM total for Wazuh manager, simpler maintenance, no Elasticsearch
# - Cons: Lose Wazuh-specific dashboards, some Wazuh API features
# - Mitigation: Grafana dashboards for Wazuh alerts are provisioned in grafana_security role
#
# WAZUH AGENT: Optional (default: enabled)
# - Provides: FIM, rootkit detection, vulnerability detection on host
# - Why optional: Adds overhead (~100MB RAM) and attack surface
# - Disable if: Running Lynis daily is sufficient for host-level auditing

- name: Create Wazuh directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ wazuh_uid | default(1000) }}"
    group: "{{ wazuh_uid | default(1000) }}"
  loop:
    - "{{ stack_dir }}/wazuh"
    - "{{ stack_dir }}/wazuh/config"
    - "{{ stack_dir }}/wazuh/logs"
    - "{{ stack_dir }}/wazuh/data"
    - "{{ stack_dir }}/wazuh/agent"
  tags:
    - wazuh

- name: Render Wazuh manager ossec.conf
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: "{{ stack_dir }}/wazuh/config/ossec.conf"
    mode: "0644"
  tags:
    - wazuh

- name: Render Wazuh agent ossec.conf (if enabled)
  ansible.builtin.template:
    src: agent-ossec.conf.j2
    dest: "{{ stack_dir }}/wazuh/agent/ossec.conf"
    mode: "0644"
  when: wazuh_agent_enabled | default(true)
  tags:
    - wazuh

- name: Render Wazuh Docker Compose snippet
  ansible.builtin.template:
    src: docker-compose-wazuh.yml.j2
    dest: "{{ stack_dir }}/wazuh/docker-compose.yml"
    mode: "0644"
  tags:
    - wazuh

- name: Check if Wazuh is already running
  ansible.builtin.shell:
    cmd: docker ps --filter name=wazuh-manager --format '{{ '{{.Names}}' }}'
  register: wazuh_running
  changed_when: false
  tags:
    - wazuh

- name: Deploy Wazuh manager container
  ansible.builtin.shell:
    cmd: |
      cd {{ stack_dir }}/wazuh && docker compose up -d
  when: wazuh_running.stdout | length == 0
  register: wazuh_deploy
  changed_when: wazuh_deploy.rc == 0
  tags:
    - wazuh

- name: Wait for Wazuh manager container to be running
  ansible.builtin.shell:
    cmd: docker ps --filter name=wazuh-manager --format '{{ '{{.Status}}' }}' | grep -q Up
  register: wazuh_container_up
  retries: 30
  delay: 10
  until: wazuh_container_up.rc == 0
  when: wazuh_deploy.changed
  tags:
    - wazuh

- name: Wait for Wazuh manager API to be healthy
  ansible.builtin.uri:
    url: https://localhost:55000/
    validate_certs: false
    status_code: 200
  register: wazuh_health
  retries: 60
  delay: 15
  until: wazuh_health.status == 200
  when: wazuh_deploy.changed
  tags:
    - wazuh

- name: Install Wazuh agent on host (if enabled)
  block:
    - name: Add Wazuh agent repository key
      ansible.builtin.apt_key:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        state: present
      tags:
        - wazuh
        - wazuh_agent

    - name: Add Wazuh agent repository
      ansible.builtin.apt_repository:
        repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
        state: present
        update_cache: true
      tags:
        - wazuh
        - wazuh_agent

    - name: Install Wazuh agent
      ansible.builtin.apt:
        name: wazuh-agent
        state: present
        # WHY: Pin the version to avoid unexpected upgrades.
        # Wazuh manager and agent versions must match.
        default_release: stable
      tags:
        - wazuh
        - wazuh_agent

    - name: Configure Wazuh agent
      ansible.builtin.template:
        src: agent-ossec.conf.j2
        dest: /var/ossec/etc/ossec.conf
        mode: "0644"
        owner: root
        group: wazuh
      notify: Restart Wazuh agent
      tags:
        - wazuh
        - wazuh_agent

    - name: Enable and start Wazuh agent
      ansible.builtin.systemd:
        name: wazuh-agent
        state: started
        enabled: true
      tags:
        - wazuh
        - wazuh_agent

    - name: Add Wazuh agent to Docker network
      ansible.builtin.shell:
        cmd: |
          docker network connect knowledge wazuh-manager 2>/dev/null || true
          docker network connect web wazuh-manager 2>/dev/null || true
      changed_when: false
      tags:
        - wazuh

  when: wazuh_agent_enabled | default(true)
  tags:
    - wazuh
    - wazuh_agent

