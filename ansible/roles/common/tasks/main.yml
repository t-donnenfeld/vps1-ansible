- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Upgrade system packages (bootstrap/maintenance)
  ansible.builtin.apt:
    upgrade: dist
  when: apt_dist_upgrade | bool

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - unzip
      - git
      - ufw
      - fail2ban
      - python3-pip
    state: present
