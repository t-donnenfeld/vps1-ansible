---
- name: Create Syncthing directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ stack_dir }}/syncthing"
    - "{{ stack_dir }}/syncthing/config"
    - "{{ stack_dir }}/syncthing/data"

- name: Create shared obsidian vaults directory
  ansible.builtin.file:
    path: "{{ obsidian_vaults_dir }}"
    state: directory
    mode: "0775"
    owner: "1000"
    group: "1000"

- name: Initialize Syncthing config if not present
  ansible.builtin.template:
    src: syncthing-config.xml.j2
    dest: "{{ stack_dir }}/syncthing/config/config.xml"
    mode: "0644"
  when: false  # Syncthing generates its own config on first run; template is a reference

- name: Ensure Syncthing config directory exists
  ansible.builtin.file:
    path: "{{ stack_dir }}/syncthing/config/config.xml"
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  changed_when: false

- name: Ensure Syncthing data directory has correct permissions
  ansible.builtin.file:
    path: "{{ stack_dir }}/syncthing/data"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
    recurse: true
  changed_when: false

